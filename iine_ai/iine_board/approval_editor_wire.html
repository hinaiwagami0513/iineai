<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>承認フロー状態 — いいねAI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-primary:#ef6108;--color-primary-hover:#d9570a;--color-primary-subtle:#fff2e2;--color-on-primary:#ffffff;
  --color-foreground:#2a2826;--color-muted:#757575;
  --color-background:#f2f1f0;--color-surface:#fbfaf8;--color-card:#ffffff;
  --color-border:#e9e8e6;--color-border-strong:#cfcdc9;
  --color-success:#12960a;--color-success-subtle:#e7f3e6;
  --color-warning:#8a6d0f;--color-warning-border:#e8b931;--color-warning-subtle:#fcf4d9;
  --color-info:#185fa5;--color-info-subtle:#e6f1fb;
  --color-destructive:#dc2626;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--radius-full:9999px;
  --text-meta:10px;--text-label:12px;--text-body:14px;--text-h3:16px;--text-h2:20px;--text-h1:30px;
  --weight-body:400;--weight-strong:500;--weight-h3:700;--weight-h1:900;
  font-family:"Noto Sans JP",sans-serif;color:var(--color-foreground);
}
body{background:var(--color-background);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}

/* ── Demo switcher ── */
.switcher{display:flex;gap:0;margin-bottom:24px;background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden}
.switcher button{
  padding:10px 20px;font-size:var(--text-body);font-weight:var(--weight-strong);
  border:none;background:transparent;cursor:pointer;color:var(--color-muted);
  border-bottom:3px solid transparent;transition:all .15s ease;font-family:inherit;
}
.switcher button:hover{color:var(--color-foreground);background:var(--color-surface)}
.switcher button.active{color:var(--color-primary);border-bottom-color:var(--color-primary)}

/* ── App container ── */
.app{
  width:1200px;max-width:100%;height:700px;background:var(--color-card);
  border:1px solid var(--color-border);border-radius:var(--radius-xl);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}

/* ── Topbar ── */
.topbar{
  height:54px;min-height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--color-border);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--color-primary-subtle);display:flex;align-items:center;justify-content:center;color:var(--color-primary);font-weight:var(--weight-h3);font-size:var(--text-body)}
.topbar-tag{font-size:var(--text-label);font-weight:var(--weight-strong);color:var(--color-foreground)}
.topbar-close{
  width:32px;height:32px;border-radius:var(--radius-sm);border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-muted);font-size:18px;
}
.topbar-close:hover{background:var(--color-surface)}

/* ── Status banner ── */
.status-banner{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;font-size:var(--text-body);gap:12px;
  border-bottom:1px solid var(--color-border);
}
.status-banner-left{display:flex;align-items:center;gap:8px}
.status-banner-left i{font-size:18px}
.status-banner .withdraw-btn{
  background:transparent;border:none;font-size:var(--text-label);color:var(--color-muted);
  cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:var(--radius-sm);
}
.status-banner .withdraw-btn:hover{text-decoration:underline;color:var(--color-foreground)}

.banner-warning{background:var(--color-warning-subtle);border-left:4px solid var(--color-warning-border);color:var(--color-warning)}
.banner-info{background:var(--color-info-subtle);border-left:4px solid var(--color-info);color:var(--color-info)}

/* ── Editor area ── */
.editor-area{flex:1;display:flex;position:relative;overflow:hidden}
.editor-left{
  width:50%;padding:24px;display:flex;align-items:center;justify-content:center;
  background:var(--color-surface);border-right:1px solid var(--color-border);
}
.img-placeholder{
  width:100%;aspect-ratio:4/3;max-height:100%;background:var(--color-background);
  border:2px dashed var(--color-border-strong);border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;color:var(--color-muted);font-size:var(--text-body);
  flex-direction:column;gap:8px;
}
.img-placeholder i{font-size:36px;opacity:.4}
.editor-right{width:50%;padding:24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.field-label{font-size:var(--text-label);font-weight:var(--weight-strong);color:var(--color-foreground);margin-bottom:6px}
.field-input{
  width:100%;padding:10px 14px;font-size:var(--text-body);font-family:inherit;
  border:1px solid var(--color-border);border-radius:var(--radius-sm);
  background:var(--color-card);color:var(--color-foreground);outline:none;
}
.field-input:focus{border-color:var(--color-primary)}
.field-textarea{resize:vertical;min-height:120px;line-height:1.6}
.field-hint{font-size:var(--text-meta);color:var(--color-muted);margin-top:4px}

/* ── Editor overlay ── */
.editor-overlay{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  transition:background .2s ease;
}
.editor-overlay.locked{background:rgba(255,255,255,0.6);pointer-events:auto;cursor:not-allowed}
.editor-overlay.readonly{background:rgba(255,255,255,0.3);pointer-events:auto;cursor:default}

/* ── Footer ── */
.editor-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 26px;border-top:1px solid var(--color-border);min-height:60px;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 20px;font-size:var(--text-body);font-weight:var(--weight-strong);
  border-radius:var(--radius-md);cursor:pointer;font-family:inherit;
  border:1px solid transparent;transition:all .15s ease;
}
.btn i{font-size:16px}
.btn-ghost{background:transparent;color:var(--color-muted);border-color:var(--color-border)}
.btn-ghost:hover{background:var(--color-surface);color:var(--color-foreground)}
.btn-primary{background:var(--color-primary);color:var(--color-on-primary);border-color:var(--color-primary)}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-success{background:var(--color-success);color:var(--color-on-primary);border-color:var(--color-success)}
.btn-success:hover{background:#0f8208}

/* ── State visibility ── */
.state{display:none}
.state.active{display:contents}
</style>
</head>
<body>

<!-- Demo Switcher -->
<div class="switcher">
  <button class="active" onclick="switchState(0)">作成者・作成中</button>
  <button onclick="switchState(1)">作成者・確認待ち</button>
  <button onclick="switchState(2)">承認者・確認待ち</button>
</div>

<!-- ════════════════════════════════════════════ -->
<!-- State 0: 作成者・作成中                        -->
<!-- ════════════════════════════════════════════ -->
<div class="app" id="app">
  <!-- Topbar (shared) -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><i class="ti ti-flame"></i></div>
      <span class="topbar-tag">投稿作成・画像</span>
    </div>
    <button class="topbar-close" onclick="toast('閉じる')"><i class="ti ti-x"></i></button>
  </div>

  <!-- Status banner slot -->
  <div id="banner-slot"></div>

  <!-- Editor area -->
  <div class="editor-area">
    <div class="editor-left">
      <div class="img-placeholder">
        <i class="ti ti-photo"></i>
        <span>画像プレビュー</span>
      </div>
    </div>
    <div class="editor-right">
      <div>
        <div class="field-label">タイトル</div>
        <input type="text" class="field-input" id="field-title" value="夏のキャンペーン投稿" placeholder="タイトルを入力">
      </div>
      <div>
        <div class="field-label">本文</div>
        <textarea class="field-input field-textarea" id="field-body" placeholder="本文を入力">夏のセール開催中！
期間限定で最大50%OFF

詳しくはプロフィールのリンクから

#夏セール #キャンペーン #期間限定</textarea>
        <div class="field-hint">ハッシュタグは自動的に末尾に追加されます</div>
      </div>
      <div>
        <div class="field-label">投稿日時</div>
        <input type="text" class="field-input" id="field-date" value="2026-07-22 12:00" placeholder="YYYY-MM-DD HH:MM">
      </div>
    </div>
    <div class="editor-overlay" id="editor-overlay"></div>
  </div>

  <!-- Footer slot -->
  <div class="editor-footer" id="footer-slot"></div>
</div>

<script src="sonner.js"></script>
<script>
const states = [
  {
    banner: '',
    overlay: '',
    footer: `
      <button class="btn btn-ghost" onclick="toast('一覧に戻る')"><i class="ti ti-arrow-left"></i>戻る</button>
      <button class="btn btn-primary" onclick="handleRequestReview()"><i class="ti ti-send"></i>確認をお願いする</button>
    `,
    disabled: false
  },
  {
    banner: `
      <div style="position:relative;display:flex;align-items:flex-start;gap:12px;margin:16px 20px 0;padding:16px;border-radius:var(--radius-md);border:1px solid var(--color-warning-border);background:var(--color-warning-subtle);color:var(--color-warning);font-size:var(--text-body);line-height:1.5;">
        <i class="ti ti-clock" style="font-size:16px;margin-top:1px;flex:none"></i>
        <div style="flex:1"><div style="font-weight:var(--weight-strong);margin-bottom:2px">確認待ち</div><div style="font-size:var(--text-label);opacity:.85">承認者の確認が完了するまで編集できません</div></div>
        <span onclick="handleWithdraw()" style="cursor:pointer;color:var(--color-muted);font-size:var(--text-label);white-space:nowrap;margin-top:2px">取り下げる</span>
      </div>
    `,
    overlay: 'locked',
    footer: `
      <button class="btn btn-ghost" onclick="toast('一覧に戻る')"><i class="ti ti-arrow-left"></i>戻る</button>
      <button class="btn btn-primary" disabled><i class="ti ti-send"></i>確認をお願いする</button>
    `,
    disabled: true
  },
  {
    banner: `
      <div style="display:flex;align-items:flex-start;gap:12px;margin:16px 20px 0;padding:16px;border-radius:var(--radius-md);border:1px solid var(--color-info);background:var(--color-info-subtle);color:var(--color-info);font-size:var(--text-body);line-height:1.5;">
        <i class="ti ti-eye" style="font-size:16px;margin-top:1px;flex:none"></i>
        <div><div style="font-weight:var(--weight-strong);margin-bottom:2px">承認者として確認中</div><div style="font-size:var(--text-label);opacity:.85">内容を確認して承認してください</div></div>
      </div>
    `,
    overlay: 'readonly',
    footer: `
      <button class="btn btn-ghost" onclick="toast('一覧に戻る')"><i class="ti ti-arrow-left"></i>一覧に戻る</button>
      <button class="btn btn-success" onclick="handleApprove()"><i class="ti ti-check"></i>承認する</button>
    `,
    disabled: true
  }
];

let currentState = 0;

function switchState(idx) {
  currentState = idx;
  // Update switcher tabs
  document.querySelectorAll('.switcher button').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  // Apply state
  const s = states[idx];
  document.getElementById('banner-slot').innerHTML = s.banner;
  document.getElementById('footer-slot').innerHTML = s.footer;
  const overlay = document.getElementById('editor-overlay');
  overlay.className = 'editor-overlay';
  if (s.overlay) overlay.classList.add(s.overlay);
  // Disable/enable inputs
  document.querySelectorAll('.field-input').forEach(el => {
    el.disabled = s.disabled;
    el.style.opacity = s.disabled ? '0.5' : '1';
  });
}

function handleRequestReview() {
  toast.success('確認依頼を送信しました');
  setTimeout(() => switchState(1), 600);
}

function handleWithdraw() {
  alertDialog(
    {
      title: '確認依頼を取り下げますか？',
      description: '取り下げると承認者への依頼が取り消され、再度編集できるようになります。',
      cancelLabel: 'キャンセル',
      actionLabel: '取り下げる',
      destructive: true
    },
    () => {
      toast.info('確認依頼を取り下げました');
      switchState(0);
    }
  );
}

function handleApprove() {
  toast.success('投稿を承認しました');
}

// Init
switchState(0);
</script>
</body>
</html>
